<header class="bg-primary flex flex-col lg:flex-row gap-2 min-h-[40vh] px-6 md:pb-2">
  <section class="w-full lg:w-[50%] flex flex-col justify-center gap-6">
    <h2 class="text-[5vw] lg:text-[3vw] text-white font-semibold">
      Book Appointment <br />
      With Trusted Doctors
    </h2>
    <div class="flex flex-col lg:flex-row gap-4">
      <img class="hidden lg:block" [src]="headerDisc" alt="" />
      <p class="text-dark text-[2vw] lg:text-[1vw]">
        Simply browse through our extensive list of trusted doctors,
        <br />
        schedule your appointment hassle-free.
      </p>
    </div>

    <button
      class="w-full lg:w-[60%] bg-white hover:bg-danger hover:text-white text-black font-semibold text-[4vw] px-1 py-2 lg:text-[2vw] md:px-3 md:py-6 rounded-lg shrink-0"
    >
      Book appointment

      <fa-icon [icon]="arrow"></fa-icon>
    </button>
  </section>

  <div class="w-full lg:w-[50%] -order-1 lg:order-1">
    <img class="w-full h-full object-cover" [src]="headerPhoto" alt="" />
  </div>
</header>
