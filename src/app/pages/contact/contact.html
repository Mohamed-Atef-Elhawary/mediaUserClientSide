<div class="flex flex-col gap-8 items-center py-6">
  <div class="lg:w-full">
    <img class="w-full h-full object-cover" [src]="contact" alt="" />
  </div>
  <section class="w-full flex flex-col gap-5">
    <h2 class="text-lg lg:text-[1.5vw] font-medium">
      <span class="text-sky-600">Our</span> Office
    </h2>
    <p class="text-secondary lg:text-[1.2vw]">
      7th St, Victoria Square <br />
      Maadi, Cairo, Egypt
    </p>
    <p>
      <a class="text-secondary lg:text-[1.2vw]" href="tel:+201000000000"
        ><span class="text-dark">Tel:</span> (+20) 100-000-0000</a
      ><br />
      <a class="text-secondary lg:text-[1.2vw]" href="mailto:support@mediaflow.com"
        ><span class="text-dark">Email:</span> support@mediaflow.com</a
      >
    </p>
    <h2 class="text-lg lg:text-[1.5vw] font-medium">
      Careers At <span class="text-sky-600">MediaFlow</span>
    </h2>
    <p class="lg:text-[1.2vw]">
      Want to join the future of healthcare technology? Discover our latest openings and join our
      growing team.
    </p>

    <button
      class="w-full lg:w-[60%] bg-sky-600 hover:bg-[#004b84] text-white font-semibold text-[3vw] px-1 py-2 lg:text-[1.5vw] md:px-3 md:py-6 shrink-0 cursor-pointer"
    >
      Explore Jobs
    </button>
